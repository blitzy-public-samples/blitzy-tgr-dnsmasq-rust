# sonar-project.properties (Config I, blitzy-tgr-dnsmasq-rust)
#
# Static mirror of the six -D properties that run_sonarqube_scan.sh passes
# to sonar-scanner. The run script regenerates this file at execution time
# with the resolved absolute sonar.sources path so that running
# sonar-scanner with no -D flags from this directory produces an equivalent
# invocation. The committed copy below documents the default placeholder
# value of sonar.sources for human review; the live regeneration overwrites
# it with the absolute repository root.
#
# Cross-references:
#   sonar.projectKey       AAP §0.1.3 D3 invocation; comparison identifier
#   sonar.sources          AAP §0.1.3 D3 invocation; absolute path at runtime
#   sonar.host.url         AAP §0.5.6.7 + user prompt D3
#   sonar.login            User prompt D3 (literal admin)
#   sonar.password         User prompt D3 (literal admin)
#   sonar.qualitygate.wait AAP §0.5.1 + user prompt D3

sonar.projectKey=blitzy-tgr-dnsmasq-rust
sonar.sources=.
sonar.host.url=http://localhost:9000
sonar.login=admin
sonar.password=admin
sonar.qualitygate.wait=true
